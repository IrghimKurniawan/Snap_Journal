name: snap_journal
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Fonts
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.8

  # HTTP & API
  http: ^1.6.0

  # Local Storage
  shared_preferences: ^2.5.4

  # State Management (Language)
  provider: ^6.1.2

  # Date Formatting
  intl: ^0.19.0

  # Toggle Switch (untuk Themes page)
  toggle_switch: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true